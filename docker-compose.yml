services:
  couchdb:
    image: couchdb:3.3
    container_name: mert-couchdb
    restart: unless-stopped
    ports:
      - "5984:5984"
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-adm1n}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-135790}
    volumes:
      - couchdb_data:/opt/couchdb/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # CouchDB veritabanlarını oluştur (ilk başlatmada)
  couchdb-init:
    image: curlimages/curl:latest
    container_name: mert-couchdb-init
    depends_on:
      couchdb:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        COUCH="http://${COUCHDB_USER:-adm1n}:${COUCHDB_PASSWORD:-135790}@couchdb:5984"
        # Sistem veritabanları
        for db in _users _replicator _global_changes; do
          curl -s -X PUT "$$COUCH/$$db" 2>/dev/null || true
        done
        # Uygulama veritabanları
        for db in mert_fisler mert_urunler mert_cari_hesaplar mert_kasa_islemleri mert_personeller mert_bankalar mert_cekler mert_araclar mert_arac_shifts mert_arac_km_logs mert_uretim_profilleri mert_uretim_kayitlari mert_faturalar mert_fatura_stok mert_tahsilatlar mert_kv_store; do
          curl -s -X PUT "$$COUCH/$$db" 2>/dev/null || true
          echo "  DB: $$db"
        done
        # CORS ayarları
        curl -s -X PUT "$$COUCH/_node/_local/_config/httpd/enable_cors" -d '"true"'
        curl -s -X PUT "$$COUCH/_node/_local/_config/cors/origins" -d '"*"'
        curl -s -X PUT "$$COUCH/_node/_local/_config/cors/methods" -d '"GET, PUT, POST, HEAD, DELETE"'
        curl -s -X PUT "$$COUCH/_node/_local/_config/cors/headers" -d '"accept, authorization, content-type, origin, referer"'
        curl -s -X PUT "$$COUCH/_node/_local/_config/cors/credentials" -d '"true"'
        echo "CouchDB kurulumu tamamlandi!"

  mert-site:
    build:
      context: .
      args:
        # VITE_COUCHDB_URL kasıtlı olarak boş bırakıldı.
        # Uygulama tarayıcıda çalışırken URL'yi runtime'da otomatik belirler:
        #   window.location.origin + '/couchdb'  →  nginx proxy  →  http://couchdb:5984
        # Bu sayede localhost'a bağımlı kalmadan herhangi bir cihazdan erişim mümkündür.
        VITE_COUCHDB_URL: ""
        VITE_COUCHDB_USER: ${COUCHDB_USER:-adm1n}
        VITE_COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-135790}
    container_name: mert-site
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      couchdb:
        condition: service_healthy

  # ─── İZLEME STEĞİ (opsiyonel) ────────────────────────────────────────────────
  # Başlatmak için: docker-compose --profile monitoring up -d
  # Grafana arayüzü: http://sunucu-ip:3000  (admin / mert2024)
  # Prometheus:      http://sunucu-ip:9090

  # CouchDB → Prometheus metrik köprüsü
  couchdb-exporter:
    image: gesellix/couchdb-prometheus-exporter:latest
    container_name: mert-couchdb-exporter
    restart: unless-stopped
    profiles: ["monitoring"]
    environment:
      COUCHDB_URI: http://couchdb:5984
      COUCHDB_USERNAME: ${COUCHDB_USER:-adm1n}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-135790}
      # Hangi DB'leri izleyeceğini bildir (virgülle)
      DATABASES: "mert_fisler,mert_urunler,mert_cari_hesaplar,mert_kasa_islemleri,mert_personeller,mert_bankalar,mert_cekler,mert_araclar,mert_arac_shifts,mert_arac_km_logs,mert_uretim_profilleri,mert_uretim_kayitlari,mert_faturalar,mert_fatura_stok,mert_tahsilatlar,mert_kv_store"
    ports:
      - "9984:9984"
    depends_on:
      couchdb:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: mert-prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--log.level=warn"
    depends_on:
      - couchdb-exporter

  grafana:
    image: grafana/grafana:latest
    container_name: mert-grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-mert2024}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/couchdb.json
      # Grafana alerting — Telegram bildirimleri için .env dosyasına ekleyin:
      # TELEGRAM_BOT_TOKEN=123456:ABC...
      # TELEGRAM_CHAT_ID=-100123456
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_ALERTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  couchdb_data:
  prometheus_data:
  grafana_data:

