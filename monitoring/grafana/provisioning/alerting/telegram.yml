apiVersion: 1

# Telegram bildirimleri için .env dosyasına ekleyin:
#   TELEGRAM_BOT_TOKEN=123456789:AAF...
#   TELEGRAM_CHAT_ID=-1001234567890

contactPoints:
  - orgId: 1
    name: telegram
    receivers:
      - uid: telegram-receiver
        type: telegram
        settings:
          bottoken: "${TELEGRAM_BOT_TOKEN}"
          chatid: "${TELEGRAM_CHAT_ID}"
          message: |
            🚨 *MERT4 Sunucu Uyarısı*

            **Alert:** {{ .CommonLabels.alertname }}
            **Şiddet:** {{ .CommonLabels.severity }}

            {{ range .Alerts }}
            📌 {{ .Annotations.summary }}
            {{ .Annotations.description }}
            {{ end }}
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: telegram
    group_by: ["alertname", "severity"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: telegram
        matchers:
          - severity =~ "critical|warning"
